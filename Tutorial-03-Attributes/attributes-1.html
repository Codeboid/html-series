<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
</head>
<body>
    <!-- The tag alone — just shows up, nothing special -->
    <p>Hello, world!</p>
    
    <!-- The tag + attribute — now it has a tooltip on hover! -->
    <p title="This is a greeting">Hello, world!</p>
</body>
</html>
