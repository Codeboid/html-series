<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript and Superscript</title>
</head>
<body>
    <p>Chemical formula: CO<sub>2</sub></p>
    <p>Math equation: E = mc<sup>2</sup></p>
    <p>Temperature: 25°C<sup>*</sup></p>
    <p><small><sup>*</sup>Measured at sea level</small></p>
</body>
</html>
